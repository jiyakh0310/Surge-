<!-- public/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SURGE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">SURGE</div>
        <ul></ul>
    </nav>

    <div class="container">
        <div class="glass-card" style="max-width: 600px; margin: 0 auto; padding: 3rem;">
            <header style="margin-bottom: 2rem; text-align: center;">
                <h1>Event Registration</h1>
                <p style="color: var(--text-dim);">Fill in your details to secure your spot.</p>
            </header>

            <form id="reg-form">
                <div class="form-group">
                    <label>Select Event</label>
                    <select id="event-select" required>
                        <option value="" disabled selected>Loading events...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label>College / University</label>
                    <input type="text" id="college" placeholder="Enter your college name" required>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Complete Registration</button>
            </form>
            <div id="msg" style="margin-top: 1.5rem; text-align: center; font-weight: 600;"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
