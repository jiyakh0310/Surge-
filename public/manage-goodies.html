<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Goodies | SURGE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">SURGE</div>
        <ul></ul>
    </nav>

    <div class="container">
        <header style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>Goodie Management</h1>
                <p style="color: var(--text-gray);">Manage distribution of event swag and perks.</p>
            </div>
            <button class="btn btn-primary" onclick="showAddModal()">Add Goodie</button>
        </header>
        <p id="goodie-msg" style="margin-bottom:1rem; color: var(--text-dim);"></p>

        <div class="grid" id="goodies-grid">
            <!-- Loaded via JS -->
        </div>
    </div>

    <!-- Add Modal -->
    <div id="add-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;">
        <div class="glass-card modal-card" style="width: 100%; max-width: 450px; padding: 2rem;">
            <h2 style="margin-bottom: 1.5rem;">Add Goodie</h2>
            <form id="add-goodie-form">
                <div class="form-group">
                    <label>Goodie Name</label>
                    <input type="text" id="goodie_name" placeholder="e.g. T-Shirt, Stickers" required>
                </div>
                <div class="form-group">
                    <label>Sponsor</label>
                    <select id="sponsor_id" required>
                        <option value="">Select Sponsor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Linked Event</label>
                    <select id="event_id" required>
                        <option value="">Select Event</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Goodie</button>
                    <button type="button" class="btn btn-outline" onclick="hideAddModal()" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            auth.requireOrganizer();
            loadGoodies();
            loadDropdowns();
        });

        async function loadDropdowns() {
            const [sponsorsRes, eventsRes] = await Promise.all([fetch('/api/sponsors'), fetch('/api/events')]);
            const sponsorsResult = await sponsorsRes.json();
            const sponsors = Array.isArray(sponsorsResult) ? sponsorsResult : [];
            const eventsResult = await eventsRes.json();
            const events = Array.isArray(eventsResult) ? eventsResult : (eventsResult.events || eventsResult.data || []);

            document.getElementById('sponsor_id').innerHTML += sponsors
                .map(s => `<option value="${s.sponsor_id || ''}">${s.sponsor_name || 'Unnamed Sponsor'}</option>`)
                .join('');
            document.getElementById('event_id').innerHTML += events
                .map(e => `<option value="${e.event_id || e.id || ''}">${e.event_name || e.title || 'Untitled Event'}</option>`)
                .join('');
        }

        async function loadGoodies() {
            try {
                const res = await fetch('/api/goodies');
                const result = await res.json();
                const data = Array.isArray(result) ? result : [];
                const grid = document.getElementById('goodies-grid');
                if (data.length === 0) {
                    grid.innerHTML = '<div class="glass-card"><p style="color: var(--text-dim);">No data yet</p></div>';
                    return;
                }
                
                grid.innerHTML = data.map(g => `
                    <div class="glass-card">
                        <h3 style="color: var(--accent-pink); margin-bottom: 1rem;">${g.goodie_name || 'Unnamed Goodie'}</h3>
                        <p style="font-size: 0.9rem; margin-bottom: 0.5rem;"><strong>Sponsor:</strong> ${g.sponsor_name || 'Unnamed Sponsor'}</p>
                        <p style="font-size: 0.9rem; margin-bottom: 1.5rem; color: var(--text-dim);"><strong>Event:</strong> ${g.event_name || 'Untitled Event'}</p>
                        <button class="btn btn-outline" style="width: 100%; padding: 0.6rem 1rem; font-size: 0.85rem; border-color: var(--accent-pink); color: var(--accent-pink);" onclick="deleteGoodie(${g.goodie_id || 0})">Delete</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        function showAddModal() { document.getElementById('add-modal').style.display = 'flex'; }
        function hideAddModal() { document.getElementById('add-modal').style.display = 'none'; }

        async function deleteGoodie(id) {
            if (confirm('Are you sure you want to delete this goodie?')) {
                try {
                    const res = await fetch(`/api/goodies/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        loadGoodies();
                        const msg = document.getElementById('goodie-msg');
                        msg.style.color = 'var(--accent-cyan)';
                        msg.textContent = 'Goodie deleted successfully.';
                        setTimeout(() => { msg.textContent = ''; }, 3000);
                    } else {
                        alert('Error deleting goodie');
                    }
                } catch (err) {
                    console.error('Error:', err);
                    alert('Error deleting goodie');
                }
            }
        }

        document.getElementById('add-goodie-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('goodie-msg');
            const data = {
                goodie_name: document.getElementById('goodie_name').value,
                sponsor_id: document.getElementById('sponsor_id').value,
                event_id: document.getElementById('event_id').value
            };

            const res = await fetch('/api/goodies', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                hideAddModal();
                loadGoodies();
                document.getElementById('add-goodie-form').reset();
                msg.style.color = 'var(--accent-cyan)';
                msg.textContent = 'Goodie saved successfully.';
            } else {
                const err = await res.json();
                msg.style.color = 'var(--accent-pink)';
                msg.textContent = `Error: ${err.error || 'Unable to save goodie.'}`;
            }
        });
    </script>
</body>
</html>
