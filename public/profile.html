<!-- public/profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | SURGE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">SURGE</div>
        <ul></ul>
    </nav>

    <div class="container">
        <header style="margin-bottom: 3rem;">
            <h1 id="user-name">Loading...</h1>
            <p id="user-email" style="color: var(--text-gray);"></p>
        </header>

        <div class="grid" style="grid-template-columns: 1fr 2fr;">
            <!-- Left: Stats & Actions -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="glass-card">
                    <h4 style="margin-bottom: 1rem; color: var(--accent-lavender);">Account Details</h4>
                    <p style="font-size: 0.9rem; margin-bottom: 0.5rem;"><strong>Role:</strong> <span id="user-role" style="text-transform: capitalize;">-</span></p>
                    <p style="font-size: 0.9rem;"><strong>ID:</strong> <span id="user-id">#</span></p>
                    <button id="profile-logout-btn" class="btn btn-outline" style="width:100%; margin-top:1rem;">Logout</button>
                </div>
                
                <div id="quick-actions" class="glass-card">
                    <h4 style="margin-bottom: 1rem; color: var(--accent-cyan);">Quick Actions</h4>
                    <div id="action-buttons" style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <!-- Dynamic Buttons -->
                    </div>
                </div>

                <div class="glass-card stat-card" id="event-stat-card">
                    <span class="value" id="event-count">0</span>
                    <span class="label">Registrations</span>
                </div>
            </div>

            <!-- Right: Registered Events -->
            <div class="glass-card">
                <h3 style="margin-bottom: 1.5rem;">Registered Events</h3>
                <div id="events-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <p style="color: var(--text-dim);">Fetching registrations...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = auth.requireLogin();
            if (!user) return;

            // Set UI details
            document.getElementById('user-name').innerText = user.username;
            document.getElementById('user-email').innerText = user.email;
            document.getElementById('user-role').innerText = user.role;
            document.getElementById('user-id').innerText = '#' + user.user_id;
            document.getElementById('profile-logout-btn').addEventListener('click', () => {
                localStorage.removeItem('surge_user');
                window.location.href = 'login.html';
            });

            // Set Quick Actions based on role
            const actionContainer = document.getElementById('action-buttons');
            if (user.role === 'organizer') {
                actionContainer.innerHTML = `
                    <a href="dashboard.html" class="btn btn-primary" style="font-size: 0.9rem; text-align: center;">Go to Dashboard</a>
                    <a href="manage-events.html" class="btn btn-outline" style="font-size: 0.9rem; text-align: center;">Manage Events</a>
                `;
            } else {
                actionContainer.innerHTML = `
                    <a href="events.html" class="btn btn-primary" style="font-size: 0.9rem; text-align: center;">Register for New Event</a>
                `;
            }

            // Fetch full profile data
            try {
                const res = await fetch(`/api/auth/profile/${user.user_id}`);
                const data = await res.json();
                
                if (res.ok) {
                    const list = document.getElementById('events-list');
                    document.getElementById('event-count').innerText = data.events.length;
                    
                    if (data.events.length === 0) {
                        list.innerHTML = '<p style="color: var(--text-dim);">No events registered yet.</p>';
                    } else {
                        list.innerHTML = data.events.map(e => `
                            <div style="padding: 1.25rem; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <h4 style="color: var(--accent-cyan); margin-bottom: 0.25rem;">${e.event_name}</h4>
                                    <p style="font-size: 0.85rem; color: var(--text-dim);">📍 ${e.venue_name} | 📅 ${new Date(e.event_date).toLocaleDateString()}</p>
                                </div>
                                <a href="events.html" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.8rem;">View</a>
                            </div>
                        `).join('');
                    }
                }
            } catch (err) {
                console.error('Error fetching profile:', err);
            }
        });
    </script>
</body>
</html>
