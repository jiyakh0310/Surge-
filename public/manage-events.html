<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events | SURGE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">SURGE</div>
        <ul></ul>
    </nav>

    <div class="container">
        <header style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>Manage Events</h1>
                <p style="color: var(--text-gray);">Create and control all campus events.</p>
            </div>
            <button class="btn btn-primary" onclick="showAddModal()">Add New Event</button>
        </header>
        <p id="event-msg" style="margin-bottom:1rem; color: var(--text-dim);"></p>

        <div class="glass-card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Event Name</th>
                            <th>Date</th>
                            <th>Club</th>
                            <th>Venue</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="events-table-body">
                        <tr><td colspan="5" style="text-align: center;">Loading events...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div id="add-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;">
        <div class="glass-card modal-card" style="width: 100%; max-width: 500px; padding: 2rem;">
            <h2 style="margin-bottom: 1.5rem;">Add New Event</h2>
            <form id="add-event-form">
                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="event_name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Event Date</label>
                    <input type="datetime-local" id="event_date" required>
                </div>
                <div class="form-group">
                    <label>Club</label>
                    <select id="club_id" required>
                        <option value="">Select Club</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Venue</label>
                    <select id="venue_id" required>
                        <option value="">Select Venue</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Create Event</button>
                    <button type="button" class="btn btn-outline" onclick="hideAddModal()" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            auth.requireOrganizer();
            loadEvents();
            loadDropdowns();
        });

        async function loadDropdowns() {
            try {
                const [clubsRes, venuesRes] = await Promise.all([
                    fetch('/api/clubs'),
                    fetch('/api/venues')
                ]);
                const clubs = await clubsRes.json();
                const venues = await venuesRes.json();
                const safeClubs = Array.isArray(clubs) ? clubs : [];
                const safeVenues = Array.isArray(venues) ? venues : [];

                document.getElementById('club_id').innerHTML += safeClubs
                    .map(c => `<option value="${c.club_id || c.id || ''}">${c.club_name || c.name || 'General'}</option>`).join('');
                document.getElementById('venue_id').innerHTML += safeVenues
                    .map(v => `<option value="${v.venue_id || v.id || ''}">${v.venue_name || v.name || 'TBA'}</option>`).join('');
            } catch (err) {
                console.error('Error loading dropdowns:', err);
            }
        }

        async function loadEvents() {
            try {
                const res = await fetch('/api/events');
                const result = await res.json();
                const events = Array.isArray(result) ? result : (result.events || result.data || []);
                const tbody = document.getElementById('events-table-body');
                
                if (events.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No events found.</td></tr>';
                } else {
                    tbody.innerHTML = events.map(e => `
                        <tr>
                            <td><strong>${e.event_name || e.title || 'Untitled Event'}</strong></td>
                            <td>${e.event_date ? new Date(e.event_date).toLocaleDateString() : 'TBA'}</td>
                            <td>${e.club_name || 'General'}</td>
                            <td>${e.venue_name || 'TBA'}</td>
                            <td>
                                <button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; border-color: var(--accent-pink); color: var(--accent-pink);" onclick="deleteEvent(${e.event_id || e.id})">Delete</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('Error loading events:', err);
            }
        }

        function showAddModal() { document.getElementById('add-modal').style.display = 'flex'; }
        function hideAddModal() { document.getElementById('add-modal').style.display = 'none'; }

        document.getElementById('add-event-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('event-msg');
            const data = {
                event_name: document.getElementById('event_name').value,
                description: document.getElementById('description').value,
                event_date: document.getElementById('event_date').value,
                club_id: document.getElementById('club_id').value,
                venue_id: document.getElementById('venue_id').value
            };

            try {
                const res = await fetch('/api/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    hideAddModal();
                    loadEvents();
                    document.getElementById('add-event-form').reset();
                    msg.style.color = 'var(--accent-cyan)';
                    msg.textContent = 'Event saved successfully.';
                } else {
                    const err = await res.json();
                    msg.style.color = 'var(--accent-pink)';
                    msg.textContent = `Error: ${err.error || 'Unable to add event.'}`;
                }
            } catch (err) {
                msg.style.color = 'var(--accent-pink)';
                msg.textContent = 'Error adding event.';
            }
        });

        async function deleteEvent(id) {
            if (confirm('Are you sure you want to delete this event?')) {
                try {
                    await fetch(`/api/events/${id}`, { method: 'DELETE' });
                    loadEvents();
                } catch (err) {
                    alert('Error deleting event');
                }
            }
        }
    </script>
</body>
</html>
