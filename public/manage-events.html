<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events | SURGE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">SURGE</div>
        <ul></ul>
    </nav>

    <div class="container">
        <header style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>Manage Events</h1>
                <p style="color: var(--text-gray);">Create and control all campus events.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">Add New Event</button>
        </header>
        <p id="event-msg" style="margin-bottom:1rem; color: var(--text-dim);"></p>

        <div class="glass-card">
            <div class="table-container card-scroll-inner">
                <table>
                    <thead>
                        <tr>
                            <th>Event Name</th>
                            <th>Date</th>
                            <th>Club</th>
                            <th>Venue</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="events-table-body">
                        <tr><td colspan="5" style="text-align: center;">Loading events...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Event Modal -->
    <div id="event-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;">
        <div class="glass-card modal-card" style="width: 100%; max-width: 500px; padding: 2rem;">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Add New Event</h2>
            <form id="event-form">
                <input type="hidden" id="edit_id">
                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="event_name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Event Date</label>
                    <input type="datetime-local" id="event_date" required>
                </div>
                <div class="form-group">
                    <label>Club</label>
                    <select id="club_id" required>
                        <option value="">Select Club</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Venue</label>
                    <select id="venue_id" required>
                        <option value="">Select Venue</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;" id="modal-submit-btn">Create Event</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal()" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        let clubsCache = [];
        let venuesCache = [];

        function toDatetimeLocalValue(raw) {
            if (!raw) return '';
            const d = new Date(raw);
            if (Number.isNaN(d.getTime())) return '';
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function parseNullableInt(v) {
            if (v === '' || v === undefined || v === null) return null;
            const n = Number(v);
            return Number.isFinite(n) ? n : null;
        }

        document.addEventListener('DOMContentLoaded', () => {
            auth.requireOrganizer();
            loadEvents();
            loadDropdowns();
        });

        async function loadDropdowns() {
            try {
                const [clubsRes, venuesRes] = await Promise.all([
                    fetch('/api/clubs'),
                    fetch('/api/venues')
                ]);
                clubsCache = await clubsRes.json();
                venuesCache = await venuesRes.json();
                clubsCache = Array.isArray(clubsCache) ? clubsCache : [];
                venuesCache = Array.isArray(venuesCache) ? venuesCache : [];
            } catch (err) {
                console.error('Error loading dropdowns:', err);
            }
        }

        function populateDropdowns(selectedClub, selectedVenue) {
            const clubSel = document.getElementById('club_id');
            const venueSel = document.getElementById('venue_id');
            clubSel.innerHTML = '<option value="">Select Club</option>' +
                clubsCache.map(c => `<option value="${c.club_id || c.id || ''}" ${(c.club_id || c.id) == selectedClub ? 'selected' : ''}>${c.club_name || c.name || 'General'}</option>`).join('');
            venueSel.innerHTML = '<option value="">Select Venue</option>' +
                venuesCache.map(v => `<option value="${v.venue_id || v.id || ''}" ${(v.venue_id || v.id) == selectedVenue ? 'selected' : ''}>${v.venue_name || v.name || 'TBA'}</option>`).join('');
        }

        async function loadEvents() {
            try {
                const res = await fetch('/api/events');
                const result = await res.json();
                const events = Array.isArray(result) ? result : (result.events || result.data || []);
                const tbody = document.getElementById('events-table-body');
                
                if (events.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No events found.</td></tr>';
                } else {
                    tbody.innerHTML = events.map(e => {
                        const eid = e.event_id || e.id;
                        const dateVal = toDatetimeLocalValue(e.event_date);
                        return `
                        <tr>
                            <td><strong>${e.event_name || e.title || 'Untitled Event'}</strong></td>
                            <td>${e.event_date ? new Date(e.event_date).toLocaleDateString() : 'TBA'}</td>
                            <td>${e.club_name || 'General'}</td>
                            <td>${e.venue_name || 'TBA'}</td>
                            <td>
                                <div class="row-actions">
                                    <button class="action-icon" title="Edit" onclick='editEvent(${eid}, ${JSON.stringify(e.event_name || e.title || "")}, ${JSON.stringify(e.description || "")}, "${dateVal}", ${e.club_id || 0}, ${e.venue_id || 0})'>✏️</button>
                                    <button class="action-icon delete" title="Delete" onclick="deleteEvent(${eid})">🗑️</button>
                                </div>
                            </td>
                        </tr>
                    `}).join('');
                }
            } catch (err) {
                console.error('Error loading events:', err);
            }
        }

        function openModal(isEdit = false) {
            document.getElementById('modal-title').textContent = isEdit ? 'Edit Event' : 'Add New Event';
            document.getElementById('modal-submit-btn').textContent = isEdit ? 'Update Event' : 'Create Event';
            if (!isEdit) {
                document.getElementById('event-form').reset();
                document.getElementById('edit_id').value = '';
                populateDropdowns('', '');
            }
            document.getElementById('event-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('event-modal').style.display = 'none';
        }

        function editEvent(id, title, desc, dateVal, clubId, venueId) {
            document.getElementById('edit_id').value = id;
            document.getElementById('event_name').value = title;
            document.getElementById('description').value = desc;
            document.getElementById('event_date').value = dateVal;
            populateDropdowns(clubId, venueId);
            openModal(true);
        }

        document.getElementById('event-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('event-msg');
            const editId = document.getElementById('edit_id').value;
            const data = {
                event_name: document.getElementById('event_name').value,
                description: document.getElementById('description').value,
                event_date: document.getElementById('event_date').value,
                club_id: parseNullableInt(document.getElementById('club_id').value),
                venue_id: parseNullableInt(document.getElementById('venue_id').value)
            };

            try {
                const url = editId ? `/api/events/${editId}` : '/api/events';
                const method = editId ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    closeModal();
                    loadEvents();
                    document.getElementById('event-form').reset();
                    msg.style.color = 'var(--accent-cyan)';
                    msg.textContent = editId ? 'Event updated successfully.' : 'Event saved successfully.';
                    setTimeout(() => { msg.textContent = ''; }, 3000);
                } else {
                    const err = await res.json();
                    msg.style.color = 'var(--accent-pink)';
                    msg.textContent = `Error: ${err.error || 'Unable to save event.'}`;
                }
            } catch (err) {
                msg.style.color = 'var(--accent-pink)';
                msg.textContent = 'Error saving event.';
            }
        });

        async function deleteEvent(id) {
            if (confirm('Are you sure you want to delete this event?')) {
                try {
                    await fetch(`/api/events/${id}`, { method: 'DELETE' });
                    loadEvents();
                    const msg = document.getElementById('event-msg');
                    msg.style.color = 'var(--accent-cyan)';
                    msg.textContent = 'Event deleted successfully.';
                    setTimeout(() => { msg.textContent = ''; }, 3000);
                } catch (err) {
                    alert('Error deleting event');
                }
            }
        }
    </script>
</body>
</html>
